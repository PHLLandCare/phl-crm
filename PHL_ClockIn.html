<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PHL Land Care - Clock In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a2540;--teal:#29b6d8;--green:#1d9e75;--red:#c0392b;--bg:#f0f4f8;--surface:#fff;--text:#1a2332;--muted:#6b7a90;--border:#e1e8ef}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#071c30 0%,#0a2f4e 55%,#0a3f60 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:28px 24px;width:100%;max-width:380px;text-align:center}
.logo{height:52px;object-fit:contain;background:#fff;border-radius:10px;padding:5px 12px;margin-bottom:12px}
.company{font-size:18px;font-weight:700;color:#fff;margin-bottom:2px}
.sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:20px}
.clock{font-size:36px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.date{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:24px;margin-top:2px}

/* STATE: lookup */
.lookup-label{font-size:11px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;text-align:left}
.lookup-input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;text-align:center;letter-spacing:.05em}
.lookup-input::placeholder{color:rgba(255,255,255,.25);font-size:14px;letter-spacing:0}
.lookup-input:focus{border-color:var(--teal)}
.lookup-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:8px}
.lookup-btn:active{opacity:.85}
.lookup-btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:#f87171;margin-bottom:10px;min-height:18px}

/* STATE: confirm */
.emp-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 12px}
.emp-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:2px}
.emp-info{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:20px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:20px}
.status-in{background:rgba(29,158,117,.2);border:1px solid rgba(29,158,117,.4);color:#4ade80}
.status-out{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);color:#f87171}
.action-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:17px;font-weight:800;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;transition:opacity .1s}
.action-btn:active{opacity:.85}
.btn-clockin{background:var(--green);color:#fff}
.btn-clockout{background:var(--red);color:#fff}
.back-btn{background:none;border:none;color:rgba(255,255,255,.35);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:underline;padding:4px}

/* STATE: success */
.success-icon{font-size:52px;margin-bottom:12px}
.success-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.success-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:20px}
.success-time{font-size:28px;font-weight:800;color:#4ade80;margin-bottom:20px}
.done-btn{width:100%;padding:13px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}

/* GPS badge */
.gps-row{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;background:rgba(41,182,216,.12);border:1px solid rgba(41,182,216,.25);border-radius:99px;padding:3px 9px;font-size:10px;color:var(--teal);font-weight:600}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.screen{display:none}
.screen.active{display:block}
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://phllandcare.github.io/phl-crm/phl_logo.jpg" alt="PHL">
  <div class="company">PHL Land Care Inc.</div>
  <div class="sub">Employee Time Clock</div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="date" id="date"></div>

  <!-- SCREEN: lookup -->
  <div class="screen active" id="screen-lookup">
    <div class="gps-row">
      <span class="badge" id="gps-badge">&#x2022; Checking GPS...</span>
      <span class="badge">&#x1F512; Secure</span>
    </div>
    <div class="lookup-label">Employee ID</div>
    <input class="lookup-input" id="emp-input" placeholder="e.g. PHL-0001" autocomplete="off" autocapitalize="characters" spellcheck="false">
    <div class="err" id="err-msg"></div>
    <button class="lookup-btn" id="lookup-btn" onclick="lookupEmployee()">Find My Profile</button>
    <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:4px">Ask your manager for your Employee ID</div>
  </div>

  <!-- SCREEN: confirm -->
  <div class="screen" id="screen-confirm">
    <div class="emp-avatar" id="emp-avatar"></div>
    <div class="emp-name" id="emp-name"></div>
    <div class="emp-info" id="emp-info"></div>
    <div class="status-badge" id="status-badge"></div>
    <button class="action-btn" id="action-btn" onclick="doClockAction()"></button>
    <button class="back-btn" onclick="goBack()">Not you? Go back</button>
  </div>

  <!-- SCREEN: success -->
  <div class="screen" id="screen-success">
    <div class="success-icon" id="success-icon"></div>
    <div class="success-title" id="success-title"></div>
    <div class="success-sub" id="success-sub"></div>
    <div class="success-time" id="success-time"></div>
    <button class="done-btn" onclick="resetToLookup()">Done</button>
  </div>
</div>

<script>
var SUPA_URL = 'https://gmblbltckwipghqutkhw.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtYmxibHRja3dpcGdocXV0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDcxNjEsImV4cCI6MjA5NDg4MzE2MX0.Bri1R1CHV27YKAu_CrwSkb_hZPCBJvOWSlp1UQTXQaI';
var COLORS = ['#1d9e75','#378add','#d85a30','#7f77dd','#ba7517','#0a2540','#e91e8c','#29b6d8'];

var currentEmp = null;
var isClockedIn = false;
var currentEventId = null;
var gpsCoords = null;

// Clock
function tick() {
  var n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date').textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(tick, 1000); tick();

// GPS
navigator.geolocation && navigator.geolocation.getCurrentPosition(function(pos){
  gpsCoords = {lat: pos.coords.latitude, lng: pos.coords.longitude};
  document.getElementById('gps-badge').textContent = 'GPS verified';
  document.getElementById('gps-badge').style.background = 'rgba(29,158,117,.15)';
  document.getElementById('gps-badge').style.borderColor = 'rgba(29,158,117,.3)';
  document.getElementById('gps-badge').style.color = '#4ade80';
}, function(){
  document.getElementById('gps-badge').textContent = 'GPS unavailable';
});

// Supabase helper
async function sb(method, path, body) {
  var opts = {method:method,headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'}};
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SUPA_URL+'/rest/v1'+path, opts);
  if (!res.ok) { var e = await res.text(); throw new Error(e); }
  var t = await res.text();
  return t ? JSON.parse(t) : [];
}

function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return h;}
function col(eid){return COLORS[Math.abs(hashStr(eid||''))%COLORS.length];}
function ini(fname,lname){return((fname||'')[0]||'').toUpperCase()+((lname||'')[0]||'').toUpperCase();}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

// Check URL params (from kiosk QR scan)
window.addEventListener('load', function() {
  var params = new URLSearchParams(window.location.search);
  var empId = params.get('emp');
  if (empId) {
    document.getElementById('emp-input').value = empId;
    lookupEmployee();
  }
});

// ── Zebra DS9308 / USB barcode scanner support ─────────────────────────
// The DS9308 acts as a USB HID keyboard: it types the full scanned string
// then sends Enter. Two cases:
//
// Case 1: Employee's QR code encodes their full clock-in URL.
//   Scanner types the URL into emp-input → we detect it, extract the emp=
//   parameter, set the field to just the employee ID, and auto-submit.
//
// Case 2: Employee's QR code encodes just their Employee ID (e.g. EMP-005).
//   Scanner types "EMP-005" + Enter → normal Enter-key handler submits.
//
// This means the page works regardless of how the QR codes were generated,
// and no special scanner configuration is needed beyond the default
// "add Enter suffix" setting (which ships enabled on DS9308 out of the box).
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('emp-input');
  if (!input) return;

  input.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    var val = input.value.trim();

    // If it looks like a URL containing emp= extract just the ID
    if (val.indexOf('emp=') !== -1) {
      try {
        // Handle hash-based URLs: grab the query string after the hash
        var hashIdx = val.indexOf('#');
        var queryStr = hashIdx !== -1 ? val.slice(hashIdx + 1) : val;
        var qIdx = queryStr.indexOf('?');
        if (qIdx !== -1) queryStr = queryStr.slice(qIdx + 1);
        var params = new URLSearchParams(queryStr);
        var empId = params.get('emp');
        if (empId) {
          input.value = empId;
        }
      } catch(err) { /* fall through with raw value */ }
    }

    lookupEmployee();
  });

  // Also keep the input focused so scans always land in the right field.
  // Re-focus after any click elsewhere on the page (kiosk mode).
  document.addEventListener('click', function(evt) {
    if (evt.target !== input) input.focus();
  });
  input.focus();
});

async function lookupEmployee() {
  var eid = document.getElementById('emp-input').value.trim();
  if (!eid) { document.getElementById('err-msg').textContent = 'Please enter your Employee ID'; return; }
  var btn = document.getElementById('lookup-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Looking up...';
  document.getElementById('err-msg').textContent = '';
  try {
    var data = await sb('GET', '/employees?employee_id=eq.' + encodeURIComponent(eid) + '&select=*');
    if (!data.length || !data[0].active) {
      document.getElementById('err-msg').textContent = 'Employee ID not found or inactive. Check with your manager.';
      btn.disabled = false; btn.textContent = 'Find My Profile'; return;
    }
    currentEmp = data[0];
    // Check if already clocked in today
    var today = new Date().toISOString().split('T')[0];
    var events = await sb('GET', '/clock_events?employee_id=eq.' + encodeURIComponent(eid) + '&created_at=gte.' + today + 'T00:00:00&order=created_at.desc&limit=1&select=*');
    isClockedIn = events.length > 0 && !events[0].clock_out;
    currentEventId = (events.length > 0 && !events[0].clock_out) ? events[0].id : null;
    showConfirm();
  } catch(e) {
    document.getElementById('err-msg').textContent = 'Error: ' + e.message;
  }
  btn.disabled = false; btn.textContent = 'Find My Profile';
}

function showConfirm() {
  var e = currentEmp;
  var avatar = document.getElementById('emp-avatar');
  avatar.textContent = ini(e.fname, e.lname);
  avatar.style.background = col(e.employee_id);
  document.getElementById('emp-name').textContent = (e.fname||'') + ' ' + (e.lname||'');
  document.getElementById('emp-info').textContent = e.employee_id + ' · ' + (e.division||'') + (e.crew ? ' · ' + e.crew : '');
  var badge = document.getElementById('status-badge');
  var btn = document.getElementById('action-btn');
  if (isClockedIn) {
    badge.className = 'status-badge status-in';
    badge.textContent = 'Currently clocked in';
    btn.className = 'action-btn btn-clockout';
    btn.textContent = 'Clock Out';
  } else {
    badge.className = 'status-badge status-out';
    badge.textContent = 'Not clocked in';
    btn.className = 'action-btn btn-clockin';
    btn.textContent = 'Clock In';
  }
  showScreen('screen-confirm');
}

async function doClockAction() {
  var btn = document.getElementById('action-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> ' + (isClockedIn ? 'Clocking out...' : 'Clocking in...');
  var now = new Date().toISOString();
  try {
    if (isClockedIn && currentEventId) {
      // Clock OUT - update existing event
      await sb('PATCH', '/clock_events?id=eq.' + currentEventId, {clock_out: now});
      showSuccess(false, now);
    } else {
      // Clock IN - create new event
      var body = {
        employee_id: currentEmp.employee_id,
        employee_name: (currentEmp.fname||'') + ' ' + (currentEmp.lname||''),
        division: currentEmp.division,
        clock_in: now,
        method: gpsCoords ? 'Mobile (GPS)' : 'Mobile',
        flagged: false
      };
      if (gpsCoords) { body.gps_lat = gpsCoords.lat; body.gps_lng = gpsCoords.lng; }
      await sb('POST', '/clock_events', body);
      showSuccess(true, now);
    }
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.textContent = isClockedIn ? 'Clock Out' : 'Clock In';
  }
}

function showSuccess(isClockIn, timeStr) {
  var t = new Date(timeStr);
  var timeFormatted = t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('success-icon').textContent = isClockIn ? '✅' : '👋';
  document.getElementById('success-title').textContent = isClockIn ? 'Clocked In!' : 'Clocked Out!';
  document.getElementById('success-sub').textContent = (currentEmp.fname||'') + ', have a ' + (isClockIn ? 'great shift!' : 'great rest of your day!');
  document.getElementById('success-time').textContent = timeFormatted;
  showScreen('screen-success');
  // Auto-reset after 5 seconds
  setTimeout(resetToLookup, 5000);
}

function goBack() {
  currentEmp = null; isClockedIn = false; currentEventId = null;
  document.getElementById('emp-input').value = '';
  document.getElementById('err-msg').textContent = '';
  showScreen('screen-lookup');
}

function resetToLookup() {
  currentEmp = null; isClockedIn = false; currentEventId = null;
  document.getElementById('emp-input').value = '';
  document.getElementById('err-msg').textContent = '';
  var btn = document.getElementById('lookup-btn');
  btn.disabled = false; btn.textContent = 'Find My Profile';
  showScreen('screen-lookup');
}
</script>
</body>
</html>
