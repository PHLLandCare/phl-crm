  </head>
  <body>
    <div id="root"></div>
    <script>
      // Unregister old service workers, then register new one
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister())
        }).then(() => {
          navigator.serviceWorker.register('/phl-crm/sw.js', { scope: '/phl-crm/' })
        })
      }
    </script>
  </body>
