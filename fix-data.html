<!DOCTYPE html>
<html>
<head><title>PHL CRM — Data Fix</title></head>
<body style="font-family:sans-serif;padding:2rem;background:#0a0f1a;color:#f1f5f9">
<h2>PHL CRM — One-Time Data Fix</h2>
<div id="log" style="font-family:monospace;font-size:14px;line-height:2"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = supabase
const sb = createClient(
  'https://gmblbltckwipghqutkhw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtYmxibHRja3dpcGdocXV0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDcxNjEsImV4cCI6MjA5NDg4MzE2MX0.Bri1R1CHV27YKAu_CrwSkb_hZPGHqUtKhw'
)

const log = (msg, ok=true) => {
  document.getElementById('log').innerHTML += `<div style="color:${ok?'#4ade80':'#f87171'}">${msg}</div>`
}

async function run() {
  log('Starting fixes...')

  // 1. Fix Romy name in employees
  const { data: e1, error: e1err } = await sb.from('employees')
    .update({ fname: 'Romy', lname: 'Cruz' })
    .eq('employee_id', 'PHL-0001')
    .select()
  log(e1err ? '❌ Employee name fix: ' + e1err.message : `✅ Employee name fixed (${e1?.length} rows)`, !e1err)

  // 2. Fix employee_name in all clock_events for PHL-0001
  const { data: e2, error: e2err } = await sb.from('clock_events')
    .update({ employee_name: 'Romy Cruz' })
    .eq('employee_id', 'PHL-0001')
    .select()
  log(e2err ? '❌ Clock events name fix: ' + e2err.message : `✅ Clock events fixed (${e2?.length} rows)`, !e2err)

  // 3. Delete the bad Mobile (GPS) open punch for PHL-0001
  const { data: e3, error: e3err } = await sb.from('clock_events')
    .delete()
    .eq('employee_id', 'PHL-0001')
    .eq('method', 'Mobile (GPS)')
    .is('clock_out', null)
    .select()
  log(e3err ? '❌ Delete bad punch: ' + e3err.message : `✅ Bad punch deleted (${e3?.length} rows)`, !e3err)

  log('Done! You can close this page.')
}

run()
</script>
</body>
</html>
