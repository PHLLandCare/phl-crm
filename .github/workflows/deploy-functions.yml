name: Deploy Supabase Edge Functions

on:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy invite-user
        run: supabase functions deploy invite-user --project-ref gmblbltckwipghqutkhw --no-verify-jwt

      - name: Deploy send-sms
        run: supabase functions deploy send-sms --project-ref gmblbltckwipghqutkhw --no-verify-jwt
        continue-on-error: true

      - name: Deploy send-fax
        run: supabase functions deploy send-fax --project-ref gmblbltckwipghqutkhw --no-verify-jwt
        continue-on-error: true

      - name: Deploy signalwire-call
        run: supabase functions deploy signalwire-call --project-ref gmblbltckwipghqutkhw --no-verify-jwt
        continue-on-error: true

      - name: Deploy send-email
        run: supabase functions deploy send-email --project-ref gmblbltckwipghqutkhw --no-verify-jwt
        continue-on-error: true

      - name: Deploy square-payment
        run: supabase functions deploy square-payment --project-ref gmblbltckwipghqutkhw --no-verify-jwt
        continue-on-error: true
