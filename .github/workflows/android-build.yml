name: Build Android APK

# Builds a debug-signed APK you can sideload onto a real Android phone for
# testing. Debug builds are self-signed automatically by the Android build
# tools — no separate keystore/signing setup is needed for this kind of
# real-device testing.
#
# Runs automatically whenever app or android/ code changes are pushed to
# master, and can also be triggered manually from the Actions tab any time
# you want a fresh build without pushing a code change.

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'android/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI and sync Android project
        id: capsync
        run: npx cap sync android > /tmp/cap-sync.log 2>&1
        continue-on-error: true

      - name: Surface cap sync failure as annotation
        if: steps.capsync.outcome == 'failure'
        run: |
          echo "::error::CAP_SYNC_OUTPUT: $(tail -c 800 /tmp/cap-sync.log | tr '\n' '|')"
          exit 1

      - name: Make gradlew executable
        if: steps.capsync.outcome == 'success'
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: gradlebuild
        if: steps.capsync.outcome == 'success'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace > /tmp/gradle-build.log 2>&1
        continue-on-error: true

      - name: Surface gradle failure as annotation
        if: steps.gradlebuild.outcome == 'failure'
        run: |
          echo "::error::GRADLE_OUTPUT: $(tail -c 3000 /tmp/gradle-build.log | tr '\n' '|')"
          exit 1

      - name: Upload APK
        if: steps.gradlebuild.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: phl-crm-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
