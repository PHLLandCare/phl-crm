<!DOCTYPE html>
<html>
<head><title>TimeClock Fix</title>
<style>body{font-family:monospace;background:#0a0f1a;color:#f1f5f9;padding:40px;font-size:13px;}
.ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;}</style>
</head>
<body>
<h2>TimeClock Query Debug</h2>
<div id="log"></div>
<script>
const SUPA_URL = 'https://gmblbltckwipghqutkhw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtYmxibHRja3dpcGdocXV0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDcxNjEsImV4cCI6MjA5NDg4MzE2MX0.Bri1R1CHV27YKAu_CrwSkb_hZPCBJvOWSlp1UQTXQaI';
const log = (msg, cls='info') => { document.getElementById('log').innerHTML += `<div class="${cls}">${msg}</div>`; };

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + offset * 7;
  const mon = new Date(now.getFullYear(), now.getMonth(), diff, 0, 0, 0, 0);
  return mon;
}

async function run() {
  const weekStart = getWeekStart(0);
  const weekEnd = new Date(weekStart.getTime() + 7 * 86400000);
  
  log(`Now: ${new Date().toISOString()}`);
  log(`weekStart: ${weekStart.toISOString()}`);
  log(`weekEnd: ${weekEnd.toISOString()}`);
  log('---');

  // Run exact same query as employee portal
  const url = `${SUPA_URL}/rest/v1/clock_events?select=*&employee_id=eq.PHL-0001&clock_in=gte.${weekStart.toISOString()}&clock_in=lt.${weekEnd.toISOString()}&order=clock_in.desc`;
  log(`Query URL: ${url}`);
  
  const res = await fetch(url, {
    headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
  });
  const data = await res.json();
  log(`Results: ${data.length} rows`, data.length > 0 ? 'ok' : 'err');
  for (const r of data) {
    log(`  id=${r.id} in=${r.clock_in} out=${r.clock_out}`, 'ok');
  }
}
run().catch(e => log('Fatal: ' + e.message, 'err'));
</script>
</body>
</html>
