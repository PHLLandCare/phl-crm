<!DOCTYPE html>
<html>
<head><title>TimeClock Fix</title>
<style>body{font-family:monospace;background:#0a0f1a;color:#f1f5f9;padding:40px;font-size:14px;}
.ok{color:#4ade80;} .err{color:#f87171;} .info{color:#60a5fa;}</style>
</head>
<body>
<h2>TimeClock Debug — All Clock Events</h2>
<div id="log"></div>
<script>
const SUPA_URL = 'https://gmblbltckwipghqutkhw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtYmxibHRja3dpcGdocXV0a2h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDcxNjEsImV4cCI6MjA5NDg4MzE2MX0.Bri1R1CHV27YKAu_CrwSkb_hZPCBJvOWSlp1UQTXQaI';
const log = (msg, cls='info') => { document.getElementById('log').innerHTML += `<div class="${cls}">${msg}</div>`; };
async function run() {
  const all = await fetch(SUPA_URL + '/rest/v1/clock_events?select=id,employee_id,employee_name,clock_in,clock_out&order=clock_in.desc&limit=20', {
    headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
  }).then(r=>r.json());
  log('All recent clock events:');
  for (const r of all) {
    log(`id=${r.id} | employee_id="${r.employee_id}" | name="${r.employee_name}" | in=${r.clock_in} | out=${r.clock_out}`);
  }
}
run().catch(e => log('Fatal: ' + e.message, 'err'));
</script>
</body>
</html>
